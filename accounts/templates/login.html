{% extends 'base.html' %}

{% block title %}Sign In{% endblock %}

{% block content %}

<div class="card" style="border: 2px dashed orange; min-height: 400px; padding: 2rem;">
    <h2>Sign in to your account</h2>

    <!-- Debug message – should always be visible -->
    <p style="color: red; font-weight: bold; background: #ffe; padding: 10px;">
        DEBUG: If you see this red box → template is loading
    </p>

    <form method="post">
        {% csrf_token %}

        <div class="form-group" style="border: 1px solid blue; padding: 10px; margin: 15px 0;">
            <label for="email">Email address</label>
            <input type="email" name="email" required 
                   placeholder="name@example.com"
                   style="width:100%; padding:12px; font-size:16px; border:2px solid #333 !important; background:white !important;">
        </div>

        <div class="form-group" style="border: 1px solid green; padding: 10px; margin: 15px 0;">
            <label for="password">Password</label>
            <input type="password" name="password" required 
                   style="width:100%; padding:12px; font-size:16px; border:2px solid #333 !important; background:white !important;">
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; padding:14px; font-size:18px;">
            Sign in
        </button>
    </form>

    <p style="margin-top: 2rem; text-align: center;">
        Don't have an account? <a href="{% url 'register' %}">Create one</a>
    </p>
</div>

{% endblock %}
