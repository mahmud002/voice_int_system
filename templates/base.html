<!DOCTYPE html>
<html lang="en">
<head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Voice Intelligence System{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Our custom CSS -->
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    

</head>
<body>

    <header>
        <div class="nav">
            <a href="{% url 'home' %}" class="brand">Voice Int System</a>
            <div class="auth-links">
                {% if user.is_authenticated %}
                    <span>{{ user.email }}</span>
                    <a href="{% url 'logout' %}">Sign out</a>
                {% else %}
                    <a href="{% url 'login' %}">Sign in</a>
                    <a href="{% url 'register' %}">Create account</a>
                {% endif %}
            </div>
        </div>
    </header>

    <div class="container">

        <!-- Global messages display -->
        {% if messages %}
            {% for message in messages %}
                <div class="message 
                    {% if message.tags == 'success' %}message-success{% endif %}
                    {% if message.tags == 'error' or message.tags == 'danger' %}message-error{% endif %}
                ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Where child templates insert their content -->
        {% block content %}
            <!-- Default content if child doesn't override -->
            <p>No content defined in this page.</p>
        {% endblock %}

    </div>

</body>
</html>
